adapters:
  medianet:
    # Media.net supports the following regional endpoint domains.
    # Kindly set the endpoint below to match the datacenter region where this config is deployed:
    #   US East  → https://prebid-adapter-useast.media.net/rtb/pb/prebids2s
    #   US West  → https://prebid-adapter-uswest.media.net/rtb/pb/prebids2s
    #   Asia     → https://prebid-adapter-asia.media.net/rtb/pb/prebids2s
    #   Europe   → https://prebid-adapter-eu.media.net/rtb/pb/prebids2s
    #
    # Replace [REGION] in the endpoint URL with: useast | uswest | asia | eu
    endpoint: https://prebid-adapter-[REGION].media.net/rtb/pb/prebids2s?src={{PREBID_SERVER_ENDPOINT}}
    ortb-version: "2.6"
    endpoint-compression: gzip
    meta-info:
      maintainer-email: prebid@media.net
      app-media-types:
        - banner
        - video
        - native
      site-media-types:
        - banner
        - video
        - native
      supported-vendors:
      vendor-id: 142
    usersync:
      cookie-family-name: medianet
      iframe:
        url: https://hbx.media.net/checksync.php?cid=8CUEHS6F9&cs=87&type=mpbc&cv=37&vsSync=1&uspstring={{us_privacy}}&gdpr={{gdpr}}&gdprstring={{gdpr_consent}}&gpp={{gpp}}&gpp_sid={{gpp_sid}}&redirect={{redirect_url}}
        support-cors: false
        uid-macro: '<vsid>'
      redirect:
        url: https://cs.media.net/cksync.php?cs=1&type=pbs&ovsid=setstatuscode&bidder=medianet&gdpr={{gdpr}}&gdpr_consent={{gdpr_consent}}&us_privacy={{us_privacy}}&gpp={{gpp}}&gpp_sid={{gpp_sid}}&redirect={{redirect_url}}
        support-cors: false
        uid-macro: '<vsid>'
