adapters:
  loopme:
    endpoint: http://prebid.loopmertb.com
    meta-info:
      maintainer-email: prebid@loopme.com
      app-media-types:
        - banner
        - video
        - audio
        - native
      site-media-types:
        - banner
        - video
        - audio
        - native
      supported-vendors:
      vendor-id: 109
    usersync:
      cookie-family-name: loopme
      redirect:
        url: https://csync.loopme.me/?pubid=11393&gdpr={gdpr}&gdpr_consent={gdpr_consent}&us_privacy={us_privacy}&redirect={redirect_url}
        uid-macro: '{udid}'
