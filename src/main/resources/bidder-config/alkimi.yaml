adapters:
  alkimi:
    endpoint: https://exchange.alkimi-onboarding.com/server/bid
    meta-info:
      maintainer-email: support@alkimi.org
      app-media-types:
        - banner
        - video
        - audio
      site-media-types:
        - banner
        - video
        - audio
      supported-vendors:
      vendor-id: 1169
    usersync:
      cookie-family-name: alkimi
      redirect:
        url: https://user-sync.alkimi-onboarding.com/ssp-sync?gdpr={{gdpr}}&gdpr_consent={{gdpr_consent}}&us_privacy={{us_privacy}}&gpp={{gpp}}&gpp_sid={{gpp_sid}}&redirect={{redirect_url}}
        uid-macro: '${UID}'
