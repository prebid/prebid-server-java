adapters:
  intertech:
    endpoint: https://prebid.intertechsrvcs.com/prebid/{page_id}?imp-id={imp_id}&ssp-id=10500
    endpoint-compression: gzip
    meta-info:
      maintainer-email: prebid@intertechsrvcs.com
      site-media-types:
        - banner
        - native
      vendor-id: 0
    usersync:
      cookie-family-name: intertech
      redirect:
        url: https://prebid.intertechsrvcs.com/mapuid/intertech/?ssp-id=10500&gdpr={gdpr}&gdpr_consent={gdpr_consent}&location=
        support-cors: false
        uid-macro: '{UID}'
