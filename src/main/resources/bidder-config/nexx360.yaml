adapters:
  nexx360:
    endpoint: http://fast.nexx360.io/prebid-server
    endpoint-compression: gzip
    aliases:
      1accord: ~
      easybid: ~
      prismassp: ~
      ybidder:
        enabled: false
        meta-info:
          maintainer-email: team@yieldbird.com
          vendor-id: 1253
    meta-info:
      maintainer-email: tech@nexx360.io
      app-media-types:
        - banner
        - video
        - native
        - audio
      site-media-types:
        - banner
        - video
        - native
        - audio
      supported-vendors:
      vendor-id: 965
    usersync:
      cookie-family-name: nexx360
      redirect:
        url: https://fast.nexx360.io/usermatchredir/redirect?gdpr={{gdpr}}&gdpr_consent={{gdpr_consent}}&us_privacy={{us_privacy}}&gpp={{gpp}}&gppsid={{gpp_sid}}&redir={{redirect_url}}
        support-cors: false
        uid-macro: '$UID'
      iframe:
        url: https://fast.nexx360.io/usermatchredir/iframe?gdpr={{gdpr}}&gdpr_consent={{gdpr_consent}}&us_privacy={{us_privacy}}&gpp={{gpp}}&gpp_sid={{gpp_sid}}&redir={{redirect_url}}
        support-cors: false
        uid-macro: '$UID'
